services:
  mock-lead-gen-db:
    container_name: mock-lead-gen-db
    image: postgres:17
    restart: always
    ports:
      - "2345:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mock_lead_gen_db
      POSTGRES_USER: mock_lead_gen_user
      POSTGRES_PASSWORD: mock_lead_gen_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mock_lead_gen_user -d mock_lead_gen_db" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  mock-lead-gen-backend:
    container_name: mock-lead-gen-backend
    image: ${IMAGE_REF} 
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env          # Injects ALL vars (incl. MOCK_DATABASE_URL) into the container
    environment:
      # These override anything in .env if needed
      DATABASE_URL: postgresql://mock_lead_gen_user:mock_lead_gen_password@mock-lead-gen-db:5432/mock_lead_gen_db
      GOOGLE_APPLICATION_CREDENTIALS: /app/service-account.json
      API_URL: http://192.168.1.250:5050
    volumes:
      - ./backend/service-account.json:/app/service-account.json
    depends_on:
      mock-lead-gen-db:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
