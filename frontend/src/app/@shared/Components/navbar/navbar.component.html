<nav class="navbar-component">
  <!-- App Logo -->
  <div class="app-logo">
    <a routerLink="/">
      <img [src]="theme === 'light' ? 'assets/transparent_adept_logo_1.png' : 'assets/white adept logo 3.png'" alt="Adept Logo" />
    </a>
  </div>

  <!-- Navigation Menu -->
  <div class="navbar-menu" *ngIf="auth.isAuthenticated$ | async">
    <a class="nav-link" routerLink="/">HOME</a>
    <a class="nav-link" routerLink="/leads">LEADS</a>
    <a class="nav-link" routerLink="/analytics">ANALYTICS</a>
    <a class="nav-link" routerLink="/warmup-stats">WARMUP STATS</a>

    <!-- Settings Dropdown -->
    <div class="nav-dropdown" (click)="toggleSettings()" [class.open]="settingsOpen">
      <span class="nav-link">
        SETTINGS
        <mat-icon class="dropdown-caret">{{ settingsOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
      </span>
      <div class="nav-dropdown-menu" *ngIf="settingsOpen" (click)="$event.stopPropagation()">
        <a class="dropdown-item" routerLink="/settings/icp" (click)="closeSettings()">
          <mat-icon class="item-icon">tune</mat-icon>
          ICP Settings
        </a>
      </div>
    </div>
  </div>

  <div class="right-section">
    <!-- Search Bar -->
    <div class="search-bar" *ngIf="auth.isAuthenticated$ | async">
      <app-search-bar></app-search-bar>
    </div>
    <div class="navbar-actions">
      <button class="theme-toggle" (click)="toggleTheme()">
        <mat-icon>{{ theme === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- Auth0 Logout -->
      <ng-container *ngIf="auth.isAuthenticated$ | async">
        <ng-container *ngIf="auth.user$ | async as user">
          <div class="user-avatar" [title]="user.name || user.email || ''">
            {{ (user.name || user.email || 'U').charAt(0).toUpperCase() }}
          </div>
        </ng-container>
        <button class="nav-link" (click)="logout()" style="background: none; border: none; cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 500; margin-left: 10px;">LOGOUT</button>
      </ng-container>
    </div>
  </div>
  
</nav>
