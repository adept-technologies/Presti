<div class="login-page-container">
  <div class="login-card">
    <div class="logo-container">
      <img src="assets/white adept logo 3.png" alt="Adept Logo" class="brand-logo dark-only" />
      <img src="assets/transparent_adept_logo_1.png" alt="Adept Logo" class="brand-logo light-only" />
    </div>
    
    <div class="login-header">
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <button class="login-button" (click)="login()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="lock-icon">
        <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
      </svg>
      <span>LOG IN</span>
    </button>
  </div>
</div>
