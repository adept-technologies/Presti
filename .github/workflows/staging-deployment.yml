name: Deploy to Staging
# Triggers every Wednesday at 12:00 UTC, or manually.
# Assumes PRs have already been merged into main before this runs.
on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * 3"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version for production"
        required: true
        default: "v1.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adept-technologies/presti

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ============================================================
  # 1. BUILD & PUSH DOCKER IMAGE (tagged with commit SHA)
  #    Runs on GitHub's cloud runner — needs internet access to
  #    push to GHCR. Self-hosted runner not needed here.
  # ============================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      pkg_version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Compute short SHA
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_CONFIG=staging \
            -t ${{ steps.meta.outputs.image_ref }} .

      - name: Push image to GHCR
        run: |
          docker push ${{ steps.meta.outputs.image_ref }}

  # ============================================================
  # 2. DEPLOY TO STAGING
  #    Runs on the self-hosted runner installed on the staging
  #    server. No SSH needed — commands run directly on the
  #    server. The runner must be installed and online first.
  # ============================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, staging]
    needs: build-and-push

    steps:
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Pull image
        run: |
          docker pull "${{ needs.build-and-push.outputs.image_ref }}"

      - name: Deploy with Docker Compose
        run: |
          cd /home/administrator/AI-ML-Lead-Gen
          IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" \
          docker compose \
            -p lead-gen-staging \
            -f docker-compose.staging.yml \
            up -d --force-recreate --remove-orphans

      - name: Confirm deployment
        run: |
          echo "Staging deployment complete: ${{ needs.build-and-push.outputs.image_ref }}"

  # ============================================================
  # 3. SMOKE TESTS
  #    Also runs on the self-hosted runner so it can reach
  #    localhost on the staging server directly.
  # ============================================================
  smoke-tests:
    name: Smoke Tests on Staging
    runs-on: [self-hosted, staging]
    needs: [deploy-staging, build-and-push] # ← add build-and-push

    steps:
      - name: Check backend container status
        run: |
          cd /home/administrator/AI-ML-Lead-Gen

          CONTAINER_ID=$(IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" \
            docker compose \
              -p lead-gen-staging \
              -f docker-compose.staging.yml \
              ps -q backend)

          if [ -z "$CONTAINER_ID" ]; then
            echo "Backend container not found"
            exit 1
          fi

          STATUS=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID")

          echo "Container status: $STATUS"

          if [ "$STATUS" != "running" ]; then
            echo "Backend container is not running"
            docker logs "$CONTAINER_ID"
            exit 1
          fi

      - name: Print container logs
        # Print last 70 lines so startup errors and listening port
        # are always visible in the Actions run
        run: |
          cd /home/administrator/AI-ML-Lead-Gen

          CONTAINER_ID=$(IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}" \
            docker compose \
              -p lead-gen-staging \
              -f docker-compose.staging.yml \
              ps -q backend)

          if [ -z "$CONTAINER_ID" ]; then
            echo "Backend container not found"
            exit 1
          fi

          docker logs "$CONTAINER_ID" --tail 70

      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused http://localhost:5051/health \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)

  # ============================================================
  # 4. OWASP ZAP DAST SCAN (FULL)
  #    Runs on the self-hosted runner to scan the application
  #    actively running on localhost:5051.
  # ============================================================
  zap-scan-staging:
    name: OWASP ZAP Full Scan (Staging)
    runs-on: [self-hosted, staging]
    needs: smoke-tests
    permissions:
      security-events: write
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.repository_owner }} \
            --password-stdin
      - name: Run ZAP Full Scan
        run: |
          chmod 777 $(pwd)
          docker run --rm --network="host" -u root \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
            -t http://localhost:5051 \
            -I \
            -J report_json.json || EXIT_CODE=$?
            
          if [ "$EXIT_CODE" == "1" ] || [ "$EXIT_CODE" == "2" ]; then
            echo "ZAP found vulnerabilities! Please check the GitHub Security Tab."
            exit 0
          elif [ ! -z "$EXIT_CODE" ] && [ "$EXIT_CODE" != "0" ]; then
            echo "ZAP completely crashed! Failing the pipeline."
            exit $EXIT_CODE
          fi

      - name: Convert ZAP JSON to SARIF
        # SvanBoxel/zaproxy-to-ghas is abandoned and broken on the new GitHub artifact API.
        # This inline Python script does the same job reliably without any third-party dependency.
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys
          from urllib.parse import urlparse
          try:
              with open("report_json.json") as f:
                  zap = json.load(f)
          except FileNotFoundError:
              print("report_json.json not found — ZAP may not have completed. Writing empty SARIF.")
              zap = {"site": []}

          results = []
          for site in zap.get("site", []):
              for alert in site.get("alerts", []):
                  for instance in alert.get("instances", [{"uri": site.get("@name",""), "method":"","param":"","evidence":""}]):
                      raw_uri = instance.get("uri", "")
                      parsed = urlparse(raw_uri)
                      relative_uri = parsed.path.lstrip("/") or "index"
                      results.append({
                          "ruleId": str(alert.get("pluginid", "0")),
                          "message": {"text": alert.get("desc", alert.get("name", ""))},
                          "locations": [{"physicalLocation": {"artifactLocation": {"uri": relative_uri}}}],
                          "level": {"High":"error","Medium":"warning","Low":"note","Informational":"none"}.get(alert.get("riskdesc","").split(" ")[0], "none")
                      })

          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "OWASP ZAP", "rules": []}}, "results": results}]
          }
          with open("results.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          print(f"SARIF written with {len(results)} results.")
          EOF

      - name: Upload ZAP Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
          category: zap-staging

  # ============================================================
  # 5. MANUAL APPROVAL GATE
  #    The workflow pauses here. GitHub emails all required
  #    reviewers configured on the staging-approval Environment.
  #    Nothing proceeds until a reviewer clicks Approve in the
  #    GitHub Actions UI.

  #    To set this up:
  #    Repo > Settings > Environments > staging-approval
  #    > Protection rules > Required reviewers > add your team
  # ============================================================
  await-approval:
    name: Await Team Approval
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests, zap-scan-staging]
    environment: staging-approval

    steps:
      - name: Log approved deployment details
        run: |
          echo "Staging approved. Triggering prod deployment..."
          echo "SHA: ${{ needs.build-and-push.outputs.sha_short }}"
          echo "Image: ${{ needs.build-and-push.outputs.image_ref }}"
          echo "Version: ${{ inputs.version || 'not specified — push or schedule trigger' }}"

      - name: Trigger production deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          event-type: deploy-prod
          client-payload: |
            {
              "sha_short": "${{ needs.build-and-push.outputs.sha_short }}",
              "image_ref": "${{ needs.build-and-push.outputs.image_ref }}",
              "version": "${{ inputs.version || needs.build-and-push.outputs.pkg_version }}"
            }
