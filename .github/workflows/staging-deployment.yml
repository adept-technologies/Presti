name: Deploy to Staging
# Triggers every Wednesday at 12:00 UTC, or manually.
# Assumes PRs have already been merged into main before this runs.
on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * 3"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version for production"
        required: true
        default: "v1.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adept-technologies/presti

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. BUILD & PUSH DOCKER IMAGE (tagged with commit SHA)
  #    Runs on GitHub's cloud runner — needs internet access to
  #    push to GHCR. Self-hosted runner not needed here.
  # ============================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      pkg_version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Compute short SHA
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_CONFIG=staging \
            -t ${{ steps.meta.outputs.image_ref }} .

      - name: Push image to GHCR
        run: |
          docker push ${{ steps.meta.outputs.image_ref }}

  # ============================================================
  # 2. DEPLOY TO STAGING
  #    Runs on the self-hosted runner installed on the staging
  #    server. No SSH needed — commands run directly on the
  #    server. The runner must be installed and online first.
  # ============================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, staging]
    needs: build-and-push

    steps:
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Pull image
        run: |
          docker pull "${{ needs.build-and-push.outputs.image_ref }}"

      - name: Deploy with Docker Compose
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          cd /home/administrator/AI-ML-Lead-Gen
          export IMAGE_REF="${IMAGE_REF}"
          docker compose -p mock-lead-gen -f docker-compose.staging.yml up -d --remove-orphans

      - name: Confirm deployment
        run: |
          echo "Staging deployment complete: ${{ needs.build-and-push.outputs.image_ref }}"

  # ============================================================
  # 3. SMOKE TESTS
  #    Also runs on the self-hosted runner so it can reach
  #    localhost on the staging server directly.
  # ============================================================
  smoke-tests:
    name: Smoke Tests on Staging
    runs-on: [self-hosted, staging]
    needs: [deploy-staging, build-and-push] # ← add build-and-push

    steps:
      - name: Check backend container status
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          STATUS=$(docker inspect --format='{{.State.Status}}' mock-lead-gen-lead-gen-backend-1 2>/dev/null || echo "not found")
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "Backend container is not running. Aborting."
            docker compose -f /home/administrator/AI-ML-Lead-Gen/docker-compose.staging.yml logs mock-lead-gen-lead-gen-backend-1
            exit 1
          fi

      - name: Print container logs
        # Print last 70 lines so startup errors and listening port
        # are always visible in the Actions run
        run: docker logs mock-lead-gen-lead-gen-backend-1 --tail 70

      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 5 http://localhost:5050/health \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)

  # ============================================================
  # 4. MANUAL APPROVAL GATE
  #    The workflow pauses here. GitHub emails all required
  #    reviewers configured on the staging-approval Environment.
  #    Nothing proceeds until a reviewer clicks Approve in the
  #    GitHub Actions UI.

  #    To set this up:
  #    Repo > Settings > Environments > staging-approval
  #    > Protection rules > Required reviewers > add your team
  # ============================================================
  await-approval:
    name: Await Team Approval
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests]
    environment: staging-approval

    steps:
      - name: Log approved deployment details
        run: |
          echo "Staging approved. Triggering prod deployment..."
          echo "SHA: ${{ needs.build-and-push.outputs.sha_short }}"
          echo "Image: ${{ needs.build-and-push.outputs.image_ref }}"
          echo "Version: ${{ inputs.version || 'not specified — push or schedule trigger' }}"

      - name: Trigger production deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          event-type: deploy-prod
          client-payload: |
            {
              "sha_short": "${{ needs.build-and-push.outputs.sha_short }}",
              "image_ref": "${{ needs.build-and-push.outputs.image_ref }}",
              "version": "${{ inputs.version || needs.build-and-push.outputs.pkg_version }}"
            }
