name: Deploy to Production (Azure VM)

on:
  repository_dispatch:
    types: [deploy-prod]

  workflow_dispatch:
    inputs:
      sha_short:
        description: "Short commit SHA to deploy (e.g. 3f8c9a2)"
        required: true

      image_ref:
        description: "Full image ref"
        required: true

      version:
        description: "Release version (e.g. v1.2.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adept-technologies/presti

jobs:
  # ============================================================
  # 1. PRE-DEPLOY CHECKS
  # ============================================================

  pre-deploy-checks:
    name: Pre-Deploy Sanity Checks
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.inputs.outputs.sha_short }}
      image_ref: ${{ steps.inputs.outputs.image_ref }}
      version: ${{ steps.inputs.outputs.version }}

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          SHA="${{ github.event.client_payload.sha_short || inputs.sha_short }}"
          IMAGE="${{ github.event.client_payload.image_ref || inputs.image_ref }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"

          echo "sha_short=$SHA" >> $GITHUB_OUTPUT
          echo "image_ref=$IMAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Deploying:"
          echo "SHA=$SHA"
          echo "IMAGE=$IMAGE"
          echo "VERSION=$VERSION"

      - name: Verify required secrets exist
        run: |
          MISSING=""

          [ -z "${{ secrets.AZURE_HOST }}" ] && MISSING="$MISSING AZURE_HOST"
          [ -z "${{ secrets.AZURE_USER }}" ] && MISSING="$MISSING AZURE_USER"
          [ -z "${{ secrets.AZURE_SSH_KEY }}" ] && MISSING="$MISSING AZURE_SSH_KEY"
          [ -z "${{ secrets.GHCR_TOKEN }}" ] && MISSING="$MISSING GHCR_TOKEN"

          if [ -n "$MISSING" ]; then
            echo "Missing required secrets:$MISSING"
            exit 1
          fi

          echo "All required secrets present"

      - name: Confirm image exists in GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

          docker manifest inspect "${{ steps.inputs.outputs.image_ref }}"

          echo "Image exists:"
          echo "${{ steps.inputs.outputs.image_ref }}"

  # ============================================================
  # 2. CREATE RELEASE
  # ============================================================

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pre-deploy-checks

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: "${{ needs.pre-deploy-checks.outputs.version }}"
          name: "Release ${{ needs.pre-deploy-checks.outputs.version }}"

          body: |
            ## Production Deployment

            Version: `${{ needs.pre-deploy-checks.outputs.version }}`
            SHA: `${{ needs.pre-deploy-checks.outputs.sha_short }}`
            Image: `${{ needs.pre-deploy-checks.outputs.image_ref }}`

            Deployed by: @${{ github.actor }}

          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 3. DEPLOY TO PRODUCTION
  # ============================================================

  deploy-prod:
    name: Deploy to Production Azure
    runs-on: ubuntu-latest

    needs:
      - pre-deploy-checks
      - create-release

    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22

          script: |

            set -e

            IMAGE_REF="${{ needs.pre-deploy-checks.outputs.image_ref }}"
            SHA="${{ needs.pre-deploy-checks.outputs.sha_short }}"
            VERSION="${{ needs.pre-deploy-checks.outputs.version }}"

            echo "=================================================="
            echo "PRODUCTION DEPLOYMENT"
            echo "=================================================="

            echo "Version: $VERSION"
            echo "SHA: $SHA"
            echo "Image: $IMAGE_REF"

            echo ""
            echo "Logging into GHCR..."

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} \
              --password-stdin

            echo ""
            echo "Pulling image..."

            docker pull "$IMAGE_REF"

            echo ""
            echo "Taking database backup..."
            mkdir -p ~/AI-ML-Lead-Gen/db_backups
            docker compose -p lead-gen -f docker-compose.prod.yml exec -T db \
              pg_dump -U lead_gen_user lead_gen_db \
              > ~/AI-ML-Lead-Gen/db_backups/backup_${SHA}.sql
            echo "Backup saved: db_backups/backup_${SHA}.sql"

            echo ""
            echo "Saving rollback image..."

            cd ~/AI-ML-Lead-Gen

            CURRENT_CONTAINER=$(docker compose \
              -p lead-gen \
              -f docker-compose.prod.yml \
              ps -q backend)

            CURRENT_IMAGE=$(docker inspect "$CURRENT_CONTAINER" \
              --format='{{.Config.Image}}' 2>/dev/null || echo "none")

            echo "$CURRENT_IMAGE" > rollback_image.txt

            echo "Rollback image saved:"
            echo "$CURRENT_IMAGE"

            echo ""
            echo "Deploying application..."

            IMAGE_REF="$IMAGE_REF" docker compose \
              -p lead-gen \
              -f docker-compose.prod.yml \
              up -d --force-recreate --remove-orphans

            echo ""
            echo "Deployment complete"

            echo "Version: $VERSION"
            echo "SHA: $SHA"
            echo "Image: $IMAGE_REF"

  # ============================================================
  # 4. POST-DEPLOY VERIFICATION
  # ============================================================

  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest

    needs:
      - pre-deploy-checks
      - deploy-prod

    steps:
      - name: Health check
        run: |

          echo "Running production health check..."

          curl -Lk \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            https://lead-gen.adept-techno.co.ke/health \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)

      - name: Deployment success
        if: success()
        run: |

          echo "=================================================="
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "=================================================="

          echo "Version:"
          echo "${{ needs.pre-deploy-checks.outputs.version }}"

          echo ""
          echo "Image:"
          echo "${{ needs.pre-deploy-checks.outputs.image_ref }}"

      - name: Rollback instructions
        if: failure()
        run: |

          echo "=================================================="
          echo "DEPLOYMENT FAILED"
          echo "=================================================="

          echo ""
          echo "Rollback Instructions:"
          echo ""

          echo "cd ~/AI-ML-Lead-Gen"

          echo ""
          echo "ROLLBACK=\$(cat rollback_image.txt)"

          echo ""

          echo "IMAGE_REF=\$ROLLBACK docker compose \\"
          echo "  -p lead-gen \\"
          echo "  -f docker-compose.prod.yml \\"
          echo "  up -d --force-recreate --remove-orphans"
