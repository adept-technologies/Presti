name: Deploy to Production (Azure VM)

# Triggered automatically by deploy-staging.yml after team approval.
# Can also be triggered manually for hotfixes — supply the SHA, image ref,
# and version number.
on:
  repository_dispatch:
    types: [deploy-prod]

  workflow_dispatch:
    inputs:
      sha_short:
        description: "Short commit SHA to deploy (e.g. 3f8c9a2)"
        required: true
      image_ref:
        description: "Full image ref (e.g. ghcr.io/org/AI-ML-Lead-Gen:3f8c9a2)"
        required: true
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/AI-ML-Lead-Gen

jobs:
  # ============================================================
  # 1. PRE-DEPLOY SANITY CHECKS
  # ============================================================
  pre-deploy-checks:
    name: Pre-Deploy Sanity Checks
    runs-on: ubuntu-latest

    steps:
      - name: Resolve inputs (dispatch vs manual)
        id: inputs
        run: |
          SHA="${{ github.event.client_payload.sha_short || inputs.sha_short }}"
          IMAGE="${{ github.event.client_payload.image_ref || inputs.image_ref }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          echo "sha_short=$SHA" >> $GITHUB_OUTPUT
          echo "image_ref=$IMAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying SHA=$SHA  Image=$IMAGE  Version=$VERSION"

      - name: Verify required secrets exist
        run: |
          MISSING=""
          [ -z "${{ secrets.AZURE_HOST }}" ]     && MISSING="$MISSING AZURE_HOST"
          [ -z "${{ secrets.AZURE_USER }}" ]     && MISSING="$MISSING AZURE_USER"
          [ -z "${{ secrets.AZURE_SSH_KEY }}" ]  && MISSING="$MISSING AZURE_SSH_KEY"
          [ -z "${{ secrets.GHCR_TOKEN }}" ]   && MISSING="$MISSING GHCR_TOKEN"

          if [ -n "$MISSING" ]; then
            echo "Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets present"

      - name: Confirm image exists in registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker manifest inspect ${{ steps.inputs.outputs.image_ref }}
          echo "Image confirmed: ${{ steps.inputs.outputs.image_ref }}"

    outputs:
      sha_short: ${{ steps.inputs.outputs.sha_short }}
      image_ref: ${{ steps.inputs.outputs.image_ref }}
      version: ${{ steps.inputs.outputs.version }}

  # ============================================================
  # 2. CREATE GITHUB RELEASE
  #    Tagged with the version supplied at trigger time e.g. v1.2.0
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.pre-deploy-checks.outputs.version }}"
          name: "Release ${{ needs.pre-deploy-checks.outputs.version }}"
          body: |
            ## Production Deployment

            **Version:** `${{ needs.pre-deploy-checks.outputs.version }}`
            **SHA:** `${{ needs.pre-deploy-checks.outputs.sha_short }}`
            **Image:** `${{ needs.pre-deploy-checks.outputs.image_ref }}`

            Deployed by: @${{ github.actor }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 3. DEPLOY TO PRODUCTION
  #    - EC2 already has ~/Ideahub/ with docker-compose.yml and .env
  #    - No git pull needed — image is pulled from GHCR
  #    - No --build flag — image was already built by the runner
  # ============================================================
  deploy-prod:
    name: Deploy to Production Azure
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, create-release]
    environment: production

    steps:
      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }} # ubuntu
          key: ${{ secrets.AZURE_SSH_KEY }} # full contents of your .pem file
          port: 22
          script: |
            IMAGE_REF="${{ needs.pre-deploy-checks.outputs.image_ref }}"
            SHA="${{ needs.pre-deploy-checks.outputs.sha_short }}"
            VERSION="${{ needs.pre-deploy-checks.outputs.version }}"

            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling image: $IMAGE_REF"
            docker pull "$IMAGE_REF"

            echo "Saving rollback reference..."
            CURRENT_IMAGE=$(docker inspect mock-lead-gen-backend --format='{{.Config.Image}}' 2>/dev/null || echo "none")
            echo "$CURRENT_IMAGE" > ~/AI-ML-Lead-Gen/rollback_image.txt
            echo "Rollback image saved: $CURRENT_IMAGE"

            echo "Deploying with Docker Compose..."
            cd ~/AI-ML-Lead-Gen
            IMAGE_REF=$IMAGE_REF docker compose --env-file ./backend/.env up -d --remove-orphans
            # .env is already in ~/AI-ML-Lead-Gen/backend so Compose picks it up automatically
            # No --build flag — image is pre-built and pulled from GHCR

            echo "Production deployment complete — Version: $VERSION  SHA: $SHA  Image: $IMAGE_REF"

  # ============================================================
  # 4. POST-DEPLOY HEALTH CHECK
  # ============================================================
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-prod]

    steps:
      - name: Health check against EC2
        run: |
          echo "Running health check..."
          curl -Lk --fail --retry 5 --retry-delay 5 \
            https://lead-gen.adept-techno.co.ke/health \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment successful!"
          echo "Version: ${{ needs.pre-deploy-checks.outputs.version }}"
          echo "Image: ${{ needs.pre-deploy-checks.outputs.image_ref }}"
          # Uncomment to post to Slack:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"Deployed ${{ needs.pre-deploy-checks.outputs.version }} to production"}'

      - name: Rollback instructions on failure
        if: failure()
        run: |
          echo "Post-deploy verification FAILED"
          echo ""
          echo "==== ROLLBACK INSTRUCTIONS ===="
          echo "SSH into Azure and run:"
          echo "  cd ~/AI-ML-Lead-Gen"
          echo "  ROLLBACK=\$(cat rollback_image.txt)"
          echo "  IMAGE_REF=\$ROLLBACK docker compose up -d"
          echo "================================"
