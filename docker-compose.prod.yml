services:
  lead-gen-db:
    image: postgres:17
    restart: always
    ports:
      - "2345:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lead_gen_db
      POSTGRES_USER: lead_gen_user
      POSTGRES_PASSWORD: lead_gen_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lead_gen_user -d lead_gen_db" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  lead-gen-backend:
    build:
      context: ./
      dockerfile: dockerfile
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env          # Injects ALL vars (incl. PROD_DATABASE_URL) into the container
    environment:
      # These override anything in .env if needed
      DATABASE_URL: postgresql://lead_gen_user:lead_gen_password@lead-gen-db:5432/lead_gen_db
      GOOGLE_APPLICATION_CREDENTIALS: /app/service-account.json
      API_URL: https://lead-gen.adept-techno.co.ke
    volumes:
      - ./backend/service-account.json:/app/service-account.json
    depends_on:
      lead-gen-db:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
